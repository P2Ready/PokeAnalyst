<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéAnalyst — Gen 6 Battle Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #252b3b;
    --accent: #e8473f;
    --accent2: #4fc3f7;
    --text: #e8eaf0;
    --muted: #6b7280;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,195,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,195,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-top: 1rem;
  }

  header h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 700;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, #e8eaf0 30%, #4fc3f7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    font-size: 0.95rem;
    margin-top: 0.4rem;
    letter-spacing: 0.04em;
  }

  /* ── 3-column layout ── */
  .main-layout {
    display: grid;
    grid-template-columns: 360px 1fr 1fr;
    gap: 1.5rem;
    align-items: start;
  }

  @media (max-width: 1000px) {
    .main-layout { grid-template-columns: 1fr 1fr; }
    .party-col { grid-column: 1 / -1; }
  }
  @media (max-width: 640px) {
    .main-layout { grid-template-columns: 1fr; }
    .party-col { grid-column: 1; }
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    position: relative;
    overflow: visible;
    transition: border-color 0.3s;
  }
  .card:hover { border-color: rgba(79,195,247,0.2); }

  .card-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .accent-party  { background: linear-gradient(90deg, #7c3aed, #a78bfa); }
  .accent-yours  { background: linear-gradient(90deg, #e8473f, #ff7043); }
  .accent-enemy  { background: linear-gradient(90deg, #4fc3f7, #1565c0); }

  .card h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    color: var(--text);
  }

  /* ── Search ── */
  .search-wrap {
    position: relative;
    margin-bottom: 0.6rem;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.65rem 1rem 0.65rem 2.4rem;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus {
    border-color: rgba(79,195,247,0.5);
    box-shadow: 0 0 0 3px rgba(79,195,247,0.08);
  }
  .search-wrap .icon {
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.9rem;
    pointer-events: none;
  }

  /* ── Dropdown ── */
  .dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 200;
    display: none;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: 0.55rem 1rem;
    cursor: pointer;
    font-size: 0.88rem;
    transition: background 0.15s;
    text-transform: capitalize;
    border-radius: 8px;
  }
  .dropdown-item:hover, .dropdown-item.highlighted { background: rgba(79,195,247,0.1); color: #4fc3f7; }

  /* ── Large pokemon display (yours / enemy panels) ── */
  .poke-display {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    margin: 1rem 0;
    min-height: 180px;
  }
  .poke-img-wrap {
    width: 180px;
    height: 180px;
    background: var(--surface2);
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .poke-img-wrap img { width: 160px; height: 160px; image-rendering: auto; }
  .poke-img-wrap .placeholder { color: var(--muted); font-size: 2rem; }

  .poke-info h3 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    text-transform: capitalize;
    letter-spacing: 0.05em;
  }

  .type-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.4rem;
  }
  .type-badge {
    padding: 0.2rem 0.65rem;
    border-radius: 20px;
    font-size: 0.84rem;
    font-weight: 700;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: white;
  }

  /* ── Section labels ── */
  .section-label {
    font-size: 0.84rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 0.5rem;
    margin-top: 1rem;
  }

  /* ── Type chips ── */
  .weakness-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
  }
  .weakness-chip {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: capitalize;
    color: white;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .weakness-chip .multiplier { font-size: 0.68rem; opacity: 0.85; font-weight: 700; }

  .resist-chip {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: capitalize;
    color: rgba(255,255,255,0.65);
    border: 1px solid rgba(255,255,255,0.12);
    opacity: 0.72;
  }
  .resist-chip .multiplier { font-size: 0.68rem; font-weight: 700; }

  .immune-chip {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: capitalize;
    color: rgba(255,255,255,0.45);
    border: 1px dashed rgba(255,255,255,0.18);
    opacity: 0.6;
  }

  /* ── Party panel ── */
  .party-slot {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 0.9rem 0.75rem;
    margin-bottom: 0.6rem;
    transition: border-color 0.25s, background 0.25s;
    position: relative;
  }
  .party-slot.slot-danger {
    border-color: #e8473f;
    background: rgba(232,71,63,0.08);
    animation: pulse-party 2.2s infinite;
  }
  .party-slot.slot-warn {
    border-color: #ef6c00;
    background: rgba(239,108,0,0.07);
  }
  .party-slot.slot-safe {
    border-color: rgba(46,125,50,0.5);
  }

  @keyframes pulse-party {
    0%,100% { box-shadow: 0 0 0 0 rgba(232,71,63,0); }
    50%      { box-shadow: 0 0 0 5px rgba(232,71,63,0.12); }
  }

  .party-slot-inner {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    cursor: pointer;
  }
  .party-slot-inner:hover .party-mini-img { border-color: rgba(79,195,247,0.5); }
  .party-slot-inner:hover .party-slot-name { color: #4fc3f7; }

  .party-slot-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--muted);
    width: 18px;
    flex-shrink: 0;
    text-align: center;
  }

  .party-mini-img {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .party-mini-img img { width: 80px; height: 80px; image-rendering: auto; }
  .party-mini-img .mini-placeholder { color: var(--muted); font-size: 1.8rem; }

  .party-slot-info {
    flex: 1;
    min-width: 0;
  }
  .party-slot-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    text-transform: capitalize;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.04em;
  }
  .party-slot-types {
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem;
    margin-top: 0.2rem;
  }

  .party-warn-badge {
    display: none;
    font-size: 0.78rem;
    font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.06em;
    margin-top: 0.45rem;
    padding-left: 0.25rem;
  }
  .slot-danger .party-warn-badge { display: block; color: #ff6b6b; }
  .slot-warn   .party-warn-badge { display: block; color: #ffab76; }

  .party-search-wrap {
    margin-top: 0.4rem;
  }

  /* ── Level / btn row ── */
  .level-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .level-row label { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
  .level-row input[type="number"] {
    width: 80px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.5rem 0.75rem;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .level-row input[type="number"]:focus { border-color: rgba(79,195,247,0.5); }

  .btn {
    background: linear-gradient(135deg, #4fc3f7, #1565c0);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.55rem 1.1rem;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Move list ── */
  .move-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
  .move-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 0.9rem;
    transition: border-color 0.2s;
  }
  .move-item.warning-move { border-color: #ef6c00; background: rgba(239,108,0,0.08); }
  .move-item.danger-move  { border-color: #e8473f; background: rgba(232,71,63,0.1); animation: pulse-warn 2s infinite; }

  @keyframes pulse-warn {
    0%,100% { box-shadow: 0 0 0 0 rgba(232,71,63,0); }
    50%      { box-shadow: 0 0 0 4px rgba(232,71,63,0.15); }
  }

  .move-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: capitalize;
  }
  .move-meta { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--muted); }
  .warn-icon { font-size: 0.85rem; }

  /* ── Alerts ── */
  .alert {
    background: rgba(232,71,63,0.12);
    border: 1px solid rgba(232,71,63,0.4);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    font-size: 0.88rem;
    color: #ff8a80;
    margin-top: 0.75rem;
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    line-height: 1.5;
  }
  .success-msg {
    background: rgba(46,125,50,0.12);
    border: 1px solid rgba(46,125,50,0.3);
    border-radius: 12px;
    padding: 0.6rem 1rem;
    font-size: 0.85rem;
    color: #81c784;
    margin-top: 0.75rem;
  }

  /* ── Misc ── */
  hr.divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  .loader {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(79,195,247,0.2);
    border-top-color: #4fc3f7;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 0.4rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-line { font-size: 0.83rem; color: var(--muted); margin-top: 0.5rem; min-height: 1.2em; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* ── Move tooltip ── */
  .move-item {
    position: relative;
  }
  .move-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 0;
    right: 0;
    background: #0d0f14;
    border: 1px solid rgba(79,195,247,0.3);
    border-radius: 10px;
    padding: 0.6rem 0.8rem;
    font-size: 0.82rem;
    color: var(--text);
    line-height: 1.5;
    z-index: 300;
    pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .move-item:hover .move-tooltip { display: block; }

  /* ── Base stats ── */
  .stats-grid {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    margin-top: 0.25rem;
  }
  .stat-row {
    display: grid;
    grid-template-columns: 90px 36px 1fr;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
  }
  .stat-label {
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-size: 0.7rem;
    white-space: nowrap;
  }
  .stat-value {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    text-align: right;
    color: var(--text);
  }
  .stat-bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s ease;
  }
  .stat-total-row {
    display: grid;
    grid-template-columns: 90px 36px 1fr;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.3rem;
    border-top: 1px solid var(--border);
    padding-top: 0.35rem;
  }
  .stat-total-label {
    color: var(--muted);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .stat-total-value {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    text-align: right;
    color: var(--text);
  }

  /* ── Arceus type picker ── */
  .arceus-picker {
    display: none;
    margin-top: 0.6rem;
    align-items: center;
    gap: 0.6rem;
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.35);
    border-radius: 10px;
    padding: 0.55rem 0.8rem;
    font-size: 0.82rem;
    color: #a78bfa;
    font-weight: 600;
  }
  .arceus-picker.visible { display: flex; }
  .arceus-picker label { white-space: nowrap; letter-spacing: 0.04em; }
  .arceus-picker select {
    background: var(--surface2);
    border: 1px solid rgba(124,58,237,0.4);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    padding: 0.3rem 0.6rem;
    outline: none;
    cursor: pointer;
    flex: 1;
  }
  .arceus-picker select:focus { border-color: #a78bfa; }

  /* ── Party Arceus type picker ── */
  .party-arceus-pick {
    display: none;
    margin-top: 0.3rem;
    align-items: center;
    gap: 0.4rem;
  }
  .party-arceus-pick.visible { display: flex; }
  .party-arceus-pick label {
    font-size: 0.68rem;
    color: #a78bfa;
    font-weight: 700;
    white-space: nowrap;
    letter-spacing: 0.04em;
  }
  .party-arceus-pick select {
    background: var(--surface);
    border: 1px solid rgba(124,58,237,0.4);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.75rem;
    padding: 0.2rem 0.4rem;
    outline: none;
    cursor: pointer;
    flex: 1;
  }

  /* ── Mega Evolution toggle ── */
  .mega-toggle {
    display: none;
    margin-top: 0.6rem;
    align-items: center;
    gap: 0.7rem;
    background: rgba(232,71,63,0.08);
    border: 1px solid rgba(232,71,63,0.3);
    border-radius: 10px;
    padding: 0.5rem 0.85rem;
    font-size: 0.82rem;
    color: #ff8a80;
    font-weight: 600;
  }
  .mega-toggle.visible { display: flex; }
  .mega-toggle label { cursor: pointer; display: flex; align-items: center; gap: 0.45rem; white-space: nowrap; user-select: none; }
  .mega-toggle input[type=checkbox] { accent-color: #e8473f; width: 15px; height: 15px; cursor: pointer; }
  .mega-toggle select {
    background: var(--surface2);
    border: 1px solid rgba(232,71,63,0.4);
    border-radius: 7px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    padding: 0.2rem 0.5rem;
    outline: none;
    cursor: pointer;
    display: none;
  }
  .mega-toggle select.visible { display: block; }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>PokéAnalyst</h1>
    <p>Gen 1–6 Battle Intelligence · Powered by PokéAPI</p>
  </header>

  <div class="main-layout">

    <!-- ── Party Panel ── -->
    <div class="party-col">
      <div class="card">
        <div class="card-accent accent-party"></div>
        <h2>Your Party</h2>
        <div id="party-slots"></div>
      </div>
    </div>

    <!-- ── Your Pokemon ── -->
    <div class="card" id="panel-yours">
      <div class="card-accent accent-yours"></div>
      <h2>Your Pokémon</h2>

      <div class="search-wrap">
        <span class="icon">&#128269;</span>
        <input type="text" id="yours-input" placeholder="Search Pokémon…" autocomplete="off" />
        <div class="dropdown" id="yours-dropdown"></div>
      </div>
      <div class="arceus-picker" id="yours-arceus-picker">
        <label>&#9670; Arceus type:</label>
        <select id="yours-arceus-type"></select>
      </div>
      <div class="mega-toggle" id="yours-mega-toggle">
        <label><input type="checkbox" id="yours-mega-cb"> &#9889; Mega Evolve</label>
        <select id="yours-mega-form"></select>
      </div>

      <div class="poke-display">
        <div class="poke-img-wrap"><span class="placeholder">?</span></div>
        <div class="poke-info">
          <h3 id="yours-name" style="color:var(--muted);font-size:1rem;font-family:Nunito">Select a Pokémon</h3>
          <div class="type-badges" id="yours-types"></div>
        </div>
      </div>

      <hr class="divider">

      <div class="section-label">Weaknesses</div>
      <div class="weakness-grid" id="yours-weaknesses"><span style="color:var(--muted);font-size:0.85rem">—</span></div>

      <hr class="divider">
      <div class="section-label">Resistances</div>
      <div class="weakness-grid" id="yours-resistances"><span style="color:var(--muted);font-size:0.85rem">—</span></div>

      <hr class="divider">
      <div class="section-label">Immunities</div>

<script>
// ─── Type chart (Gen 6) ───────────────────────────────────────────────────────
const TYPE_CHART = {
  normal:   {rock:0.5, ghost:0, steel:0.5},
  fire:     {fire:0.5, water:0.5, rock:0.5, dragon:0.5, grass:2, ice:2, bug:2, steel:2},
  water:    {water:0.5, grass:0.5, dragon:0.5, fire:2, ground:2, rock:2},
  electric: {grass:0.5, electric:0.5, dragon:0.5, ground:0, water:2, flying:2},
  grass:    {fire:0.5, grass:0.5, poison:0.5, flying:0.5, bug:0.5, steel:0.5, dragon:0.5, water:2, ground:2, rock:2},
  ice:      {water:0.5, ice:0.5, fire:0.5, steel:0.5, grass:2, ground:2, flying:2, dragon:2},
  fighting: {poison:0.5, bug:0.5, psychic:0.5, flying:0.5, ghost:0, fairy:0.5, normal:2, ice:2, rock:2, dark:2, steel:2},
  poison:   {poison:0.5, ground:0.5, rock:0.5, ghost:0.5, steel:0, grass:2, fairy:2},
  ground:   {grass:0.5, bug:0.5, flying:0, fire:2, electric:2, poison:2, rock:2, steel:2},
  flying:   {electric:0.5, rock:0.5, steel:0.5, grass:2, fighting:2, bug:2},
  psychic:  {psychic:0.5, steel:0.5, dark:0, fighting:2, poison:2},
  bug:      {fire:0.5, fighting:0.5, flying:0.5, ghost:0.5, steel:0.5, fairy:0.5, poison:0.5, grass:2, psychic:2, dark:2},
  rock:     {fighting:0.5, ground:0.5, steel:0.5, fire:2, ice:2, flying:2, bug:2},
  ghost:    {normal:0, ghost:2, psychic:2, dark:0.5},
  dragon:   {steel:0.5, fairy:0, dragon:2},
  dark:     {fighting:0.5, fairy:0.5, dark:0.5, ghost:2, psychic:2},
  steel:    {fire:0.5, water:0.5, electric:0.5, steel:0.5, rock:2, ice:2, fairy:2},
  fairy:    {fire:0.5, poison:0.5, steel:0.5, fighting:2, dragon:2, dark:2},
};

const TYPE_COLORS = {
  normal:'#757575',fire:'#ef6c00',water:'#1565c0',electric:'#f9a825',grass:'#388e3c',
  ice:'#00838f',fighting:'#c62828',poison:'#7b1fa2',ground:'#795548',flying:'#5c6bc0',
  psychic:'#e91e63',bug:'#7cb342',rock:'#6d4c41',ghost:'#4527a0',dragon:'#1a237e',
  dark:'#37474f',steel:'#546e7a',fairy:'#d81b60'
};

function calcWeaknesses(types) {
  const result = {};
  for (const atk of Object.keys(TYPE_CHART)) {
    let mult = 1;
    for (const def of types) {
      const row = TYPE_CHART[atk] || {};
      mult *= (row[def] !== undefined ? row[def] : 1);
    }
    mult = Math.round(mult * 1000) / 1000;
    if (mult !== 1) result[atk] = mult;
  }
  return result;
}

// ─── PokeAPI ──────────────────────────────────────────────────────────────────
const API = 'https://pokeapi.co/api/v2';
const cache = {};
async function fetchJSON(url) {
  if (cache[url]) return cache[url];
  const r = await fetch(url);
  if (!r.ok) throw new Error('API error ' + r.status);
  const d = await r.json();
  cache[url] = d;
  return d;
}

let allPokemon = [];
async function loadPokemonList() {
  const d = await fetchJSON('' + (API) + '/pokemon?limit=721');
  allPokemon = d.results;
}
async function fetchPokemon(name) { return fetchJSON('' + (API) + '/pokemon/' + (name) + ''); }

// ─── Search dropdown factory ──────────────────────────────────────────────────
function setupSearch(inputEl, dropdownEl, onSelect) {
  let highlighted = -1;
  let currentItems = [];

  inputEl.addEventListener('input', () => {
    const q = inputEl.value.trim().toLowerCase();
    if (!q) { dropdownEl.classList.remove('open'); return; }
    const matches = allPokemon
      .filter(p => p.name.startsWith(q) || p.name.includes(q))
      .sort((a,b) => {
        const ai = a.name.startsWith(q) ? 0 : 1;
        const bi = b.name.startsWith(q) ? 0 : 1;
        return ai - bi || a.name.localeCompare(b.name);
      })
      .slice(0, 40);
    currentItems = matches;
    highlighted = -1;
    dropdownEl.innerHTML = '';
    if (!matches.length) { dropdownEl.classList.remove('open'); return; }
    matches.forEach((p) => {
      const el = document.createElement('div');
      el.className = 'dropdown-item';
      el.textContent = capitalize(p.name);
      el.addEventListener('mousedown', e => { e.preventDefault(); selectItem(p.name); });
      dropdownEl.appendChild(el);
    });
    dropdownEl.classList.add('open');
  });

  inputEl.addEventListener('keydown', e => {
    const items = dropdownEl.querySelectorAll('.dropdown-item');
    if (e.key === 'ArrowDown') { highlighted = Math.min(highlighted+1, items.length-1); refresh(items); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { highlighted = Math.max(highlighted-1, -1); refresh(items); e.preventDefault(); }
    else if (e.key === 'Enter') { selectItem(highlighted >= 0 && currentItems[highlighted] ? currentItems[highlighted].name : currentItems[0] && currentItems[0].name); }
    else if (e.key === 'Escape') dropdownEl.classList.remove('open');
  });

  function refresh(items) { items.forEach((el,i) => el.classList.toggle('highlighted', i === highlighted)); }
  inputEl.addEventListener('blur', () => setTimeout(() => dropdownEl.classList.remove('open'), 150));

  function selectItem(name) {
    if (!name) return;
    inputEl.value = capitalize(name);
    dropdownEl.classList.remove('open');
    onSelect(name);
  }
}

// ─── State ────────────────────────────────────────────────────────────────────
let yourWeaknesses = {};   // for the "yours" panel
let lastEnemyMoves = [];   // cache of loaded moves for re-checking party
let partyData = Array(6).fill(null); // {name, types, weakMap} per slot

// ─── Party panel ──────────────────────────────────────────────────────────────
function buildPartySlots() {
  const container = document.getElementById('party-slots');
  container.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const slot = document.createElement('div');
    slot.className = 'party-slot';
    slot.id = 'party-slot-' + (i) + '';
    slot.innerHTML =
      '<div class="party-slot-inner">' +
        '<div class="party-slot-num">' + (i+1) + '</div>' +
        '<div class="party-mini-img" id="party-img-' + i + '"><span class="mini-placeholder">?</span></div>' +
        '<div class="party-slot-info">' +
          '<div class="party-slot-name" id="party-name-' + i + '" style="color:var(--muted)">Empty</div>' +
          '<div class="party-slot-types" id="party-types-' + i + '"></div>' +
          '<div class="party-arceus-pick" id="party-arceus-pick-' + i + '">' +
            '<label>Type:</label>' +
            '<select id="party-arceus-sel-' + i + '"></select>' +
          '</div>' +
          '<div class="party-search-wrap">' +
            '<div class="search-wrap" style="margin-bottom:0">' +
              '<span class="icon" style="font-size:0.8rem">&#128269;</span>' +
              '<input type="text" id="party-input-' + i + '" placeholder="Search..." autocomplete="off" style="padding:0.45rem 0.75rem 0.45rem 2rem;font-size:0.8rem;border-radius:8px;" />' +
              '<div class="dropdown" id="party-dropdown-' + i + '"></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="party-warn-badge" id="party-warn-' + i + '">(!) DANGER</div>';
    container.appendChild(slot);

    const inputEl = document.getElementById('party-input-' + (i) + '');
    const dropdownEl = document.getElementById('party-dropdown-' + (i) + '');
    setupSearch(inputEl, dropdownEl, (name) => loadPartyMember(i, name));

    // Party arceus picker - use IIFE to capture i
    (function(idx) {
      var sel = document.getElementById('party-arceus-sel-' + idx);
      sel.innerHTML = ARCEUS_TYPES.map(function(t) {
        return '<option value="' + t + '">' + capitalize(t) + '</option>';
      }).join('');
      sel.addEventListener('change', function() {
        overridePartyArceusType(idx, sel.value);
      });
    })(i);

    // Click the slot (not the search input) to populate "Your Pokemon"
    slot.querySelector('.party-slot-inner').addEventListener('click', (e) => {
      if (e.target.closest('.party-search-wrap')) return;
      if (e.target.closest('.party-arceus-pick')) return;
      const pd = partyData[i];
      if (!pd) return;
      document.getElementById('yours-input').value = capitalize(pd.name);
      loadYourPokemon(pd.name).then(function() {
        // If this party slot is an Arceus with a non-default type, sync the picker
        if (pd.name === 'arceus' && pd.types && pd.types.length > 0) {
          var type = pd.types[0];
          var sel = document.getElementById('yours-arceus-type');
          if (sel) {
            sel.value = type;
            overrideArceusType('yours', type);
          }
        }
      });
    });
  }
}

async function loadPartyMember(idx, name) {
  const nameEl   = document.getElementById('party-name-' + idx);
  const imgEl    = document.getElementById('party-img-' + idx);
  const typesEl  = document.getElementById('party-types-' + idx);
  const pickEl   = document.getElementById('party-arceus-pick-' + idx);
  const selEl    = document.getElementById('party-arceus-sel-' + idx);

  nameEl.textContent = '...';
  nameEl.style.color = 'var(--muted)';

  // Show/hide arceus picker
  if (name === 'arceus') {
    pickEl.classList.add('visible');
    selEl.selectedIndex = 0;
  } else {
    pickEl.classList.remove('visible');
  }

  try {
    const poke = await fetchPokemon(name);
    var types = poke.types.map(t => t.type.name);

    // If arceus, use the picker's selected type instead
    if (name === 'arceus') {
      types = [selEl.value];
    }

    const weakMap = calcWeaknesses(types);
    partyData[idx] = { name, types, weakMap };

    const img = (poke.sprites && poke.sprites.other && poke.sprites.other['official-artwork'] && poke.sprites.other['official-artwork'].front_default) || (poke.sprites && poke.sprites.front_default);
    imgEl.innerHTML = img
      ? '<img src="' + img + '" alt="' + name + '">'
      : '<span class="mini-placeholder">?</span>';

    nameEl.textContent = capitalize(name);
    nameEl.style.color = 'var(--text)';
    typesEl.innerHTML = types.map(t =>
      '<span class="type-badge" style="background:' + (TYPE_COLORS[t]||'#555') + ';padding:0.15rem 0.45rem;font-size:0.65rem">' + t + '</span>'
    ).join('');

    updatePartyWarnings();

  } catch(e) {
    nameEl.textContent = '(!) Not found';
    partyData[idx] = null;
  }
}

function overridePartyArceusType(idx, type) {
  var pd = partyData[idx];
  if (!pd || pd.name !== 'arceus') return;
  var types = [type];
  var weakMap = calcWeaknesses(types);
  partyData[idx] = { name: 'arceus', types: types, weakMap: weakMap };
  document.getElementById('party-types-' + idx).innerHTML =
    '<span class="type-badge" style="background:' + (TYPE_COLORS[type]||'#555') + ';padding:0.15rem 0.45rem;font-size:0.65rem">' + type + '</span>';
  updatePartyWarnings();
}

function updatePartyWarnings() {
  // Collect dangerous move types from last enemy move load (non-status only)
  const dangerTypes = new Set(lastEnemyMoves
    .filter(m => m.damageClass !== 'status')
    .map(m => m.type)
  );

  for (let i = 0; i < 6; i++) {
    const slot = document.getElementById('party-slot-' + (i) + '');
    const warnEl = document.getElementById('party-warn-' + (i) + '');
    const pd = partyData[i];
    slot.classList.remove('slot-danger', 'slot-warn', 'slot-safe');

    if (!pd || dangerTypes.size === 0) continue;

    // Find which dangerous types this party member is weak to
    let maxMult = 0;
    for (const t of dangerTypes) {
      const mult = pd.weakMap[t] || 1;
      if (mult > maxMult) maxMult = mult;
    }

    if (maxMult >= 4) {
      slot.classList.add('slot-danger');
      warnEl.innerHTML = '&#9888; DANGER x4';
    } else if (maxMult >= 2) {
      slot.classList.add('slot-warn');
      warnEl.innerHTML = '&#9888; WEAK x2';
    } else {
      slot.classList.add('slot-safe');
    }
  }
}

// ─── Weakness rendering helper ────────────────────────────────────────────────
function renderTypeBreakdown(weakMap, weakElId, resistElId, immuneElId) {
  const weak2=[], weak4=[], resist=[], immune=[];
  for (const [type, mult] of Object.entries(weakMap)) {
    if (mult >= 4)       weak4.push({type,mult});
    else if (mult >= 2)  weak2.push({type,mult});
    else if (mult === 0) immune.push({type});
    else if (mult < 1)   resist.push({type,mult});
  }

  const weakEl   = document.getElementById(weakElId);
  const resistEl = document.getElementById(resistElId);
  const immuneEl = document.getElementById(immuneElId);

  let wHtml = '';
  [...weak4,...weak2].forEach(({type,mult}) => {
    const label = mult >= 4 ? 'x4' : 'x2';
    wHtml += '<div class="weakness-chip" style="background:' + (TYPE_COLORS[type]||'#555') + '">' + (type) + ' <span class="multiplier">' + (label) + '</span></div>';
  });
  weakEl.innerHTML = wHtml || '<span style="color:var(--muted);font-size:0.82rem">None</span>';

  let rHtml = '';
  resist.sort((a,b)=>a.mult-b.mult).forEach(({type,mult}) => {
    const label = mult <= 0.25 ? 'x0.25' : 'x0.5';
    rHtml += '<div class="resist-chip" style="background:' + (TYPE_COLORS[type]||'#555') + '">' + (type) + ' <span class="multiplier">' + (label) + '</span></div>';
  });
  resistEl.innerHTML = rHtml || '<span style="color:var(--muted);font-size:0.82rem">None</span>';

  let iHtml = '';
  immune.forEach(({type}) => {
    iHtml += '<div class="immune-chip" style="border-color:' + (TYPE_COLORS[type]||'#555') + '">' + (type) + ' <span class="multiplier">x0</span></div>';
  });
  immuneEl.innerHTML = iHtml || '<span style="color:var(--muted);font-size:0.82rem">None</span>';
}


// ─── Stats renderer ───────────────────────────────────────────────────────────
const STAT_META = [
  { key: 'hp',              label: 'HP',         color: '#e53935' },
  { key: 'attack',         label: 'Attack',     color: '#e64a19' },
  { key: 'defense',        label: 'Defense',    color: '#f9a825' },
  { key: 'special-attack', label: 'Sp. Atk',   color: '#6a1b9a' },
  { key: 'special-defense',label: 'Sp. Def',   color: '#1565c0' },
  { key: 'speed',          label: 'Speed',      color: '#00838f' },
];
const STAT_MAX = 255; // highest possible base stat

function renderStats(statsArray, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const map = {};
  statsArray.forEach(s => { map[s.stat.name] = s.base_stat; });
  const total = Object.values(map).reduce((a,b) => a+b, 0);

  let html = '';
  for (const { key, label, color } of STAT_META) {
    const val = (map[key] !== undefined && map[key] !== null) ? map[key] : 0;
    const pct = Math.round((val / STAT_MAX) * 100);
    html += '<div class="stat-row">' +
      '<div class="stat-label">' + label + '</div>' +
      '<div class="stat-value">' + val + '</div>' +
      '<div class="stat-bar-track">' +
        '<div class="stat-bar-fill" style="width:' + pct + '%;background:' + color + '"></div>' +
      '</div>' +
    '</div>';
  }
  html += '<div class="stat-total-row">' +
    '<div class="stat-total-label">Total</div>' +
    '<div class="stat-total-value">' + total + '</div>' +
    '<div></div>' +
  '</div>';
  el.innerHTML = html;
}


// ─── Arceus ───────────────────────────────────────────────────────────────────
const ARCEUS_TYPES = [
  'normal','fire','water','electric','grass','ice','fighting','poison',
  'ground','flying','psychic','bug','rock','ghost','dragon','dark','steel','fairy'
];


// Override Arceus type locally without re-fetching
function overrideArceusType(panel, type) {
  var types = [type];
  var typeColor = TYPE_COLORS[type] || '#555';

  // Update type badges
  document.getElementById(panel + '-types').innerHTML =
    '<span class="type-badge" style="background:' + typeColor + '">' + type + '</span>';

  // Recalculate weaknesses for new type
  var weakMap = calcWeaknesses(types);

  if (panel === 'yours') {
    yourWeaknesses = {};
    for (var t in weakMap) { if (weakMap[t] >= 2) yourWeaknesses[t] = weakMap[t]; }
    renderTypeBreakdown(weakMap, 'yours-weaknesses', 'yours-resistances', 'yours-immunities');
    checkEnemyWarnings();
  } else {
    renderTypeBreakdown(weakMap, 'enemy-weaknesses', 'enemy-resistances', 'enemy-immunities');
    // Update enemy weakness tracking for party warnings
    updatePartyWarnings();
  }
}

// Arceus pickers are initialized once at startup, not on every select
function initArceusPicker(selectId, onTypeChange) {
  var select = document.getElementById(selectId);
  select.innerHTML = ARCEUS_TYPES.map(function(t) {
    return '<option value="' + t + '">' + capitalize(t) + '</option>';
  }).join('');
  select.addEventListener('change', function() {
    onTypeChange(select.value);
  });
}

function showArceusPicker(pickerId, selectId) {
  var picker = document.getElementById(pickerId);
  // Only reset if not already visible (avoid triggering change event loop)
  if (!picker.classList.contains('visible')) {
    picker.classList.add('visible');
    // Use selectedIndex instead of .value to avoid firing change event
    document.getElementById(selectId).selectedIndex = 0;
  }
}

function hideArceusPicker(pickerId) {
  document.getElementById(pickerId).classList.remove('visible');
}

function setupMegaToggle(panel, baseName) {
  var toggleEl = document.getElementById(panel + '-mega-toggle');

  var selEl    = document.getElementById(panel + '-mega-form');

  // Reset state
  cbEl.checked = false;
  selEl.innerHTML = '';
  selEl.classList.remove('visible');

  if (!forms) {
    toggleEl.classList.remove('visible');
    return;
  }

  toggleEl.classList.add('visible');

  // Populate form select (only shown if multiple forms)
  if (forms.length > 1) {
    selEl.innerHTML = forms.map(function(f) {
      return '<option value="' + f.api + '">' + f.label + '</option>';
    }).join('');
  }

  // Remove old listeners by replacing element
  var newCb = cbEl.cloneNode(true);
  cbEl.parentNode.replaceChild(newCb, cbEl);
  var newSel = selEl.cloneNode(true);
  selEl.parentNode.replaceChild(newSel, selEl);

  newCb.addEventListener('change', function() {
    if (newCb.checked) {
      if (forms.length > 1) newSel.classList.add('visible');
      var apiName = forms.length > 1 ? newSel.value : forms[0].api;
      applyMegaForm(panel, apiName, baseName);
    } else {
      newSel.classList.remove('visible');
      revertMegaForm(panel, baseName);
    }
  });

  if (forms.length > 1) {
    newSel.addEventListener('change', function() {
      if (newCb.checked) applyMegaForm(panel, newSel.value, baseName);
    });
  }
}

async function applyMegaForm(panel, apiName, baseName) {
  try {
    var poke = await fetchPokemon(apiName);
    var types = poke.types.map(function(t) { return t.type.name; });
    var img = (poke.sprites && poke.sprites.other && poke.sprites.other['official-artwork'] && poke.sprites.other['official-artwork'].front_default) || (poke.sprites && poke.sprites.front_default);
    var weakMap = calcWeaknesses(types);

    // Update image
    var imgWrap = document.querySelector('#panel-' + panel + ' .poke-img-wrap');
    if (imgWrap && img) imgWrap.innerHTML = '<img src="' + img + '" alt="' + apiName + '">';

    // Update types
    document.getElementById(panel + '-types').innerHTML = types.map(function(t) {
      return '<span class="type-badge" style="background:' + (TYPE_COLORS[t]||'#555') + '">' + t + '</span>';
    }).join('');

    // Update stats
    renderStats(poke.stats, panel + '-stats');

    // Update weaknesses
    renderTypeBreakdown(weakMap, panel + '-weaknesses', panel + '-resistances', panel + '-immunities');

    if (panel === 'yours') {
      yourWeaknesses = {};
      for (var t in weakMap) { if (weakMap[t] >= 2) yourWeaknesses[t] = weakMap[t]; }
      checkEnemyWarnings();
    } else {
      updatePartyWarnings();
    }
  } catch(e) {
    console.error('Failed to load mega form', e);
  }
}

function revertMegaForm(panel, baseName) {
  // Just reload the base pokemon
  if (panel === 'yours') {
    loadYourPokemon(baseName);
  } else {
    loadEnemyPokemon(baseName);
  }
}

// ─── Your Pokemon ─────────────────────────────────────────────────────────────
async function loadYourPokemon(name) {
  // Handle Arceus form selection
  if (name === 'arceus') {
    showArceusPicker('yours-arceus-picker', 'yours-arceus-type');
  } else {
    hideArceusPicker('yours-arceus-picker');
  }
  const status = document.getElementById('yours-status');
  status.innerHTML = '<span class="loader"></span> Loading...';

  try {
    const poke = await fetchPokemon(name);
    const types = poke.types.map(t => t.type.name);

    const img = (poke.sprites && poke.sprites.other && poke.sprites.other['official-artwork'] && poke.sprites.other['official-artwork'].front_default) || (poke.sprites && poke.sprites.front_default);
    const imgWrap = document.querySelector('#panel-yours .poke-img-wrap');
    imgWrap.innerHTML = img ? '<img src="' + (img) + '" alt="' + (name) + '">' : '<span class="placeholder">?</span>';

    document.getElementById('yours-name').textContent = capitalize(name);
    document.getElementById('yours-name').style.cssText = 'font-family:Rajdhani,sans-serif;font-size:1.4rem;font-weight:700;';
    document.getElementById('yours-types').innerHTML = types.map(t =>
      '<span class="type-badge" style="background:' + (TYPE_COLORS[t]||'#555') + '">' + (t) + '</span>'
    ).join('');

    const weakMap = calcWeaknesses(types);
    yourWeaknesses = {};
    for (const [t,m] of Object.entries(weakMap)) { if (m >= 2) yourWeaknesses[t] = m; }

    renderTypeBreakdown(weakMap, 'yours-weaknesses', 'yours-resistances', 'yours-immunities');
    renderStats(poke.stats, 'yours-stats');
    setupMegaToggle('yours', name);
    status.textContent = '';
    checkEnemyWarnings();

  } catch(e) {
    status.textContent = '(!) Could not load Pokemon.';
  }
}

// ─── Enemy Pokemon ────────────────────────────────────────────────────────────
let enemyData = null;

async function loadEnemyPokemon(name) {
  // Handle Arceus form selection
  if (name === 'arceus') {
    showArceusPicker('enemy-arceus-picker', 'enemy-arceus-type');
  } else {
    hideArceusPicker('enemy-arceus-picker');
  }
  const status = document.getElementById('enemy-status');
  status.innerHTML = '<span class="loader"></span> Loading...';
  document.getElementById('enemy-moves').innerHTML = '<span style="color:var(--muted);font-size:0.85rem">&#8212;</span>';
  document.getElementById('enemy-alerts').innerHTML = '';
  enemyData = null;
  lastEnemyMoves = [];

  try {
    const poke = await fetchPokemon(name);
    enemyData = poke;
    const types = poke.types.map(t => t.type.name);

    const img = (poke.sprites && poke.sprites.other && poke.sprites.other['official-artwork'] && poke.sprites.other['official-artwork'].front_default) || (poke.sprites && poke.sprites.front_default);
    const imgWrap = document.querySelector('#panel-enemy .poke-img-wrap');
    imgWrap.innerHTML = img ? '<img src="' + (img) + '" alt="' + (name) + '">' : '<span class="placeholder">?</span>';

    document.getElementById('enemy-name').textContent = capitalize(name);
    document.getElementById('enemy-name').style.cssText = 'font-family:Rajdhani,sans-serif;font-size:1.4rem;font-weight:700;';
    document.getElementById('enemy-types').innerHTML = types.map(t =>
      '<span class="type-badge" style="background:' + (TYPE_COLORS[t]||'#555') + '">' + (t) + '</span>'
    ).join('');

    renderTypeBreakdown(calcWeaknesses(types), 'enemy-weaknesses', 'enemy-resistances', 'enemy-immunities');
    renderStats(poke.stats, 'enemy-stats');
    setupMegaToggle('enemy', name);
    document.getElementById('find-moves-btn').disabled = false;
    status.textContent = '';
    updatePartyWarnings();

  } catch(e) {
    status.textContent = '(!) Could not load Pokemon.';
  }
}

document.getElementById('find-moves-btn').addEventListener('click', async () => {
  if (!enemyData) return;
  const level = parseInt(document.getElementById('enemy-level').value) || 50;
  await findEnemyMoves(level);
});

async function findEnemyMoves(level) {
  const status = document.getElementById('enemy-status');
  status.innerHTML = '<span class="loader"></span> Fetching moves...';
  document.getElementById('enemy-moves').innerHTML = '';
  document.getElementById('enemy-alerts').innerHTML = '';

  try {
    const XY_GROUP = 'x-y';
    const levelUpMoves = enemyData.moves
      .map(m => {
        const xyDetail = m.version_group_details.find(v =>
          v.version_group.name === XY_GROUP && v.move_learn_method.name === 'level-up'
        );
        if (!xyDetail || xyDetail.level_learned_at < 1 || xyDetail.level_learned_at > level) return null;
        return { name: m.move.name, learnedAt: xyDetail.level_learned_at };
      })
      .filter(Boolean)
      .sort((a,b) => b.learnedAt - a.learnedAt || a.name.localeCompare(b.name))
      .slice(0, 4);

    if (!levelUpMoves.length) {
      document.getElementById('enemy-moves').innerHTML = '<span style="color:var(--muted);font-size:0.85rem">No level-up moves found at this level.</span>';
      status.textContent = '';
      return;
    }

    const movesWithTypes = await Promise.all(levelUpMoves.map(async m => {
      try {
        const data = await fetchJSON('' + (API) + '/move/' + (m.name) + '');
        const flavorEntry = (data.flavor_text_entries || []).find(e =>
            e.language.name === 'en' && (e.version_group && e.version_group.name === 'x-y' || true)
          );
        const flavor = flavorEntry ? flavorEntry.flavor_text.replace(/\f|\n/g, ' ').trim() : '';
        return { ...m, type: data.type.name, power: data.power, damageClass: (data.damage_class && data.damage_class.name), flavor };
      } catch(e) {
        return { ...m, type: 'unknown', power: null };
      }
    }));

    lastEnemyMoves = movesWithTypes;
    renderEnemyMoves(movesWithTypes);
    updatePartyWarnings();
    status.textContent = 'Last ' + (movesWithTypes.length) + ' move(s) learned at or before level ' + (level) + '';

  } catch(e) {
    status.textContent = '(!) Could not load moves.';
  }
}

function renderEnemyMoves(moves) {
  const container = document.getElementById('enemy-moves');
  const alertsEl  = document.getElementById('enemy-alerts');
  container.innerHTML = '';
  alertsEl.innerHTML = '';

  const warningMoves = [];

  moves.forEach(m => {
    const isWeakness = yourWeaknesses[m.type] !== undefined && m.damageClass !== 'status';
    const mult = yourWeaknesses[m.type];

    const div = document.createElement('div');
    div.className = 'move-item' + (isWeakness && mult >= 4 ? ' danger-move' : isWeakness ? ' warning-move' : '');

    const typeColor = TYPE_COLORS[m.type] || '#555';
    const powerTxt  = m.power ? '' + (m.power) + ' PWR' : (m.damageClass === 'status' ? 'Status' : '&#8212;');

    const tooltipHtml = m.flavor ? '<div class="move-tooltip">' + m.flavor + '</div>' : '';
    const warnHtml = isWeakness ? '<span class="warn-icon">' + (mult >= 4 ? '&#128308;' : '&#9888;') + '</span>' : '';
    div.innerHTML = tooltipHtml +
      '<div class="move-name">' + capitalize(m.name.replace(/-/g,' ')) + '</div>' +
      '<div class="move-meta">' +
        warnHtml +
        '<span class="type-badge" style="background:' + typeColor + ';padding:0.15rem 0.5rem;font-size:0.68rem">' + m.type + '</span>' +
        '<span>' + powerTxt + '</span>' +
        '<span style="color:var(--muted)">Lv.' + m.learnedAt + '</span>' +
      '</div>';
    container.appendChild(div);
    if (isWeakness) warningMoves.push({...m, mult});
  });

  if (warningMoves.length > 0 && Object.keys(yourWeaknesses).length > 0) {
    const lines = warningMoves.map(m =>
      '<strong style="text-transform:capitalize">' + (m.name.replace(/-/g,' ')) + '</strong> (' + (m.type) + ', x' + (m.mult) + ' damage)'
    ).join(', ');
    alertsEl.innerHTML = '<div class="alert">(!!) <span>Danger! This enemy knows move(s) your Pokemon is weak to: ' + (lines) + '</span></div>';
  } else if (Object.keys(yourWeaknesses).length > 0) {
    alertsEl.innerHTML = '<div class="success-msg">(ok) None of these moves hit a weakness on your Pokemon.</div>';
  }
}

function checkEnemyWarnings() {
  if (lastEnemyMoves.length > 0) renderEnemyMoves(lastEnemyMoves);
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function capitalize(s) {
  return s.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  try {
    await loadPokemonList();
    buildPartySlots();
    setupSearch(document.getElementById('yours-input'), document.getElementById('yours-dropdown'), loadYourPokemon);
    setupSearch(document.getElementById('enemy-input'), document.getElementById('enemy-dropdown'), loadEnemyPokemon);
    initArceusPicker('yours-arceus-type', function(type) { overrideArceusType('yours', type); });
    initArceusPicker('enemy-arceus-type', function(type) { overrideArceusType('enemy', type); });
  } catch(e) {
    console.error('Failed to load Pokemon list', e);
  }
})();
</script>
